name-template: 'Logust — Draft Changelog'
tag-template: ''
categories:
  - title: '🚀 Core & Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐞 Fixes & Stability'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '📚 Docs & Examples'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🧹 Maintenance'
    labels:
      - 'chore'
      - 'maintenance'
  - title: '🔧 CI & Testing'
    labels:
      - 'ci'
      - 'testing'
      - 'github-actions'
  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
      - 'deps'
change-template: '- $TITLE (by @$AUTHOR) #$NUMBER'
change-title-escapes: '\<*_&'
template: |
  ## What's New

  Thanks for helping make Logust better!

  $CHANGES

  ## Contributors

  $CONTRIBUTORS
