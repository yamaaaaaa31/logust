name: Deploy Docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label (e.g. 0.3.2). Leave empty to deploy "dev".'
        required: false
        default: ''
      set_latest:
        description: 'Update the "latest" alias to this version.'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-material-mike
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install mkdocs-material mkdocstrings[python] mkdocs-minify-plugin mike

      - name: Resolve version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_SET_LATEST: ${{ inputs.set_latest }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
            version="${tag#v}"
            printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
            printf 'alias=latest\n' >> "$GITHUB_OUTPUT"
          else
            version="$INPUT_VERSION"
            if [ -z "$version" ]; then
              version="dev"
            fi
            printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
            if [ "$INPUT_SET_LATEST" = "true" ]; then
              printf 'alias=latest\n' >> "$GITHUB_OUTPUT"
            else
              printf 'alias=\n' >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Deploy with mike
        env:
          MIKE_VERSION: ${{ steps.version.outputs.version }}
          MIKE_ALIAS: ${{ steps.version.outputs.alias }}
        run: |
          if [ -n "$MIKE_ALIAS" ]; then
            mike deploy --push --update-aliases "$MIKE_VERSION" "$MIKE_ALIAS"
            mike set-default --push "$MIKE_ALIAS"
          else
            mike deploy --push "$MIKE_VERSION"
          fi
